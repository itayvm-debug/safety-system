<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ea580c" />
  <title>SafeDoc — אין חיבור</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, 'Helvetica Neue', sans-serif;
      direction: rtl;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      object-fit: contain;
      margin-bottom: 24px;
    }

    .icon {
      width: 64px;
      height: 64px;
      background: #fff7ed;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 10px;
    }

    p {
      font-size: 15px;
      color: #64748b;
      line-height: 1.6;
      max-width: 320px;
      margin-bottom: 32px;
    }

    button {
      background: #ea580c;
      color: white;
      font-size: 15px;
      font-weight: 600;
      padding: 12px 32px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #c2410c; }
    button:active { background: #9a3412; }

    .company {
      margin-top: 40px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <img src="/logo.png" alt="לוגו נתן ולדמן ובניו" class="logo" onerror="this.style.display='none'" />

  <div class="icon">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ea580c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0118 12.5"/>
      <path d="M5 12.55a11 11 0 015.13-8.4"/>
      <path d="M10.71 5.05A16 16 0 0122.56 9"/>
      <path d="M1.42 9a16 16 0 014.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 016.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
  </div>

  <h1>אין חיבור לאינטרנט</h1>
  <p>
    SafeDoc זקוקה לחיבור אינטרנט כדי לטעון נתוני בטיחות עדכניים.<br />
    בדוק שה-Wi-Fi או הדאטה שלך פעילים ונסה שוב.
  </p>

  <button onclick="window.location.reload()">נסה שוב</button>

  <p class="company">SafeDoc · נתן ולדמן ובניו בע"מ</p>
</body>
</html>
