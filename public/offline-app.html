<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ea580c" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>SafeDoc — מצב לא מקוון</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #ea580c;
      --orange-light: #fff7ed;
      --orange-border: #fed7aa;
      --green: #16a34a;
      --yellow: #ca8a04;
      --red: #dc2626;
      --gray-900: #111827;
      --gray-700: #374151;
      --gray-500: #6b7280;
      --gray-400: #9ca3af;
      --gray-200: #e5e7eb;
      --gray-100: #f3f4f6;
      --gray-50: #f9fafb;
      --white: #ffffff;
    }

    html, body {
      font-family: Arial, 'Helvetica Neue', sans-serif;
      direction: rtl;
      background: var(--gray-50);
      color: var(--gray-900);
      min-height: 100dvh;
      font-size: 15px;
      line-height: 1.5;
    }

    /* ─── Header ────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      padding: env(safe-area-inset-top, 0) 16px 0;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
    }
    .logo-row { display: flex; align-items: center; gap: 8px; }
    .logo-img { width: 28px; height: 28px; object-fit: contain; }
    .app-title { font-size: 17px; font-weight: 700; color: var(--gray-900); }
    .offline-badge {
      display: flex; align-items: center; gap: 5px;
      background: #fef9c3; border: 1px solid #fde047; color: #713f12;
      font-size: 12px; font-weight: 600; padding: 3px 8px; border-radius: 20px;
    }
    .offline-dot { width: 7px; height: 7px; background: #ca8a04; border-radius: 50%; }

    /* ─── Tabs ──────────────────────────────────── */
    .tabs {
      display: flex; overflow-x: auto; scrollbar-width: none;
      -webkit-overflow-scrolling: touch; gap: 0;
      border-top: 1px solid var(--gray-100);
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0; padding: 10px 14px; font-size: 13px; font-weight: 500;
      color: var(--gray-500); border-bottom: 2px solid transparent; cursor: pointer;
      white-space: nowrap; transition: color 0.15s, border-color 0.15s;
      background: none; border-top: none; border-right: none; border-left: none;
    }
    .tab.active { color: var(--orange); border-bottom-color: var(--orange); font-weight: 600; }

    /* ─── Main ──────────────────────────────────── */
    .main { max-width: 640px; margin: 0 auto; padding: 16px 16px env(safe-area-inset-bottom, 16px); }
    .section { display: none; }
    .section.active { display: block; }

    /* ─── Page header ───────────────────────────── */
    .page-header { margin-bottom: 16px; }
    .page-title { font-size: 22px; font-weight: 700; color: var(--gray-900); }
    .page-subtitle { font-size: 13px; color: var(--gray-500); margin-top: 2px; }

    /* ─── Search ────────────────────────────────── */
    .search-wrap { position: relative; margin-bottom: 14px; }
    .search-icon {
      position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; color: var(--gray-400); pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 10px 36px 10px 14px;
      border: 1px solid var(--gray-200); border-radius: 12px; background: var(--white);
      font-size: 14px; color: var(--gray-900); outline: none;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }
    .search-input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(234,88,12,0.12); }
    .search-input::placeholder { color: var(--gray-400); }

    /* ─── List cards ────────────────────────────── */
    .card-list { display: flex; flex-direction: column; gap: 8px; }
    .card {
      background: var(--white); border: 1px solid var(--gray-100); border-radius: 14px;
      padding: 14px 16px; display: flex; align-items: center; gap: 12px;
      border-right: 4px solid var(--gray-200); cursor: pointer;
      transition: box-shadow 0.15s;
    }
    .card:active { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .card.status-valid     { border-right-color: #22c55e; }
    .card.status-expiring  { border-right-color: #eab308; }
    .card.status-expired   { border-right-color: #ef4444; }
    .card.status-missing   { border-right-color: #ef4444; }
    .card-avatar {
      width: 40px; height: 40px; border-radius: 50%; background: #fed7aa; color: var(--orange);
      font-weight: 700; font-size: 16px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .card-avatar.vehicle  { border-radius: 10px; background: #dbeafe; color: #3b82f6; }
    .card-avatar.equipment { border-radius: 10px; background: #f0fdf4; color: #16a34a; }
    .card-avatar.lifting  { border-radius: 10px; background: #fdf4ff; color: #9333ea; }
    .card-body { flex: 1; min-width: 0; }
    .card-name { font-size: 15px; font-weight: 600; color: var(--gray-900); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-meta { font-size: 13px; color: var(--gray-400); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-end { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

    /* ─── Status badge ──────────────────────────── */
    .badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
    .badge-valid    { background: #dcfce7; color: #15803d; }
    .badge-expiring { background: #fef9c3; color: #854d0e; }
    .badge-expired  { background: #fee2e2; color: #b91c1c; }
    .badge-missing  { background: #fee2e2; color: #b91c1c; }
    .badge-inactive { background: var(--gray-100); color: var(--gray-500); font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 20px; }

    /* ─── Dashboard stats ───────────────────────── */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
    .stat-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: 14px; padding: 16px; text-align: center; }
    .stat-number { font-size: 28px; font-weight: 700; color: var(--gray-900); line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: 12px; color: var(--gray-500); }
    .stat-card.red    .stat-number { color: var(--red); }
    .stat-card.yellow .stat-number { color: var(--yellow); }
    .stat-card.green  .stat-number { color: var(--green); }

    /* ─── Empty state ───────────────────────────── */
    .empty { text-align: center; padding: 60px 20px; color: var(--gray-400); }
    .empty-icon { width: 48px; height: 48px; margin: 0 auto 12px; opacity: 0.3; }
    .empty-title { font-size: 15px; font-weight: 600; color: var(--gray-500); margin-bottom: 4px; }
    .empty-sub { font-size: 13px; }

    /* ─── Saved-at label ────────────────────────── */
    .saved-at { font-size: 12px; color: var(--gray-400); text-align: center; margin-top: 20px; }

    /* ─── Chevron ───────────────────────────────── */
    .chevron { width: 16px; height: 16px; color: var(--gray-300); transform: rotate(180deg); flex-shrink: 0; }

    /* ─── Worker detail view ────────────────────── */
    .back-btn {
      display: inline-flex; align-items: center; gap: 4px;
      color: var(--orange); font-size: 14px; font-weight: 500; cursor: pointer;
      padding: 4px 0 16px; -webkit-tap-highlight-color: transparent;
    }
    .basic-data-notice {
      background: #fef9c3; border: 1px solid #fde047; color: #713f12;
      font-size: 12px; padding: 8px 12px; border-radius: 10px; margin-bottom: 12px;
    }
    .worker-header {
      display: flex; gap: 14px; align-items: flex-start;
      margin-bottom: 12px; padding: 16px; background: var(--white);
      border-radius: 14px; border: 1px solid var(--gray-200);
    }
    .worker-avatar-lg {
      width: 52px; height: 52px; border-radius: 50%; background: #fed7aa;
      color: var(--orange); font-weight: 700; font-size: 22px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .worker-name-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
    .worker-name { font-size: 18px; font-weight: 700; color: var(--gray-900); }
    .worker-meta { font-size: 13px; color: var(--gray-500); margin-top: 2px; }
    .detail-section {
      background: var(--white); border-radius: 14px; border: 1px solid var(--gray-200);
      margin-bottom: 10px; overflow: hidden;
    }
    .detail-section-title {
      font-size: 14px; font-weight: 600; color: var(--gray-700);
      padding: 11px 14px 10px; border-bottom: 1px solid var(--gray-100);
      background: var(--gray-50);
    }
    .doc-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 14px; gap: 10px;
    }
    .doc-row + .doc-row { border-top: 1px solid var(--gray-100); }
    .doc-info { flex: 1; min-width: 0; }
    .doc-label { font-size: 14px; color: var(--gray-900); }
    .doc-expiry { font-size: 12px; color: var(--gray-500); margin-top: 1px; }
    .doc-end { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .view-file-btn {
      font-size: 12px; color: var(--orange); border: 1px solid var(--orange-border);
      background: var(--orange-light); padding: 3px 10px; border-radius: 8px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .notes-card {
      background: var(--white); border-radius: 14px; border: 1px solid var(--gray-200);
      padding: 14px; font-size: 14px; color: var(--gray-700); margin-bottom: 10px;
    }
    .notes-label { font-size: 12px; font-weight: 600; color: var(--gray-400); margin-bottom: 4px; }
    .opacity-50 { opacity: 0.5; }
  </style>
</head>
<body>

<!-- ─── Header ─────────────────────────────────── -->
<div class="header">
  <div class="header-top">
    <div class="logo-row">
      <img src="/logo.png" alt="SafeDoc" class="logo-img" onerror="this.style.display='none'" />
      <span class="app-title">SafeDoc</span>
    </div>
    <div class="offline-badge">
      <span class="offline-dot"></span>
      לא מקוון
    </div>
  </div>
  <div class="tabs" id="tabs">
    <button class="tab" data-section="dashboard">דשבורד</button>
    <button class="tab" data-section="workers">עובדים</button>
    <button class="tab" data-section="vehicles">רכבים</button>
    <button class="tab" data-section="heavy">כלי צמ"ה</button>
    <button class="tab" data-section="lifting">ציוד הרמה</button>
  </div>
</div>

<!-- ─── Main ────────────────────────────────────── -->
<div class="main">

  <!-- Dashboard -->
  <div class="section" id="section-dashboard">
    <div class="page-header">
      <div class="page-title">סיכום</div>
      <div class="page-subtitle">נתונים שמורים — קריאה בלבד</div>
    </div>
    <div class="stats-grid" id="dash-stats"></div>
    <div id="dash-issues"></div>
    <div class="saved-at" id="dash-saved"></div>
  </div>

  <!-- Workers -->
  <div class="section" id="section-workers">
    <!-- List view -->
    <div id="workers-list-view">
      <div class="page-header">
        <div class="page-title">עובדים</div>
        <div class="page-subtitle" id="workers-subtitle"></div>
      </div>
      <div class="search-wrap">
        <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input class="search-input" id="workers-search" type="search" placeholder="חיפוש לפי שם או ת.ז..." />
      </div>
      <div class="card-list" id="workers-list"></div>
      <div class="saved-at" id="workers-saved"></div>
    </div>
    <!-- Detail view -->
    <div id="workers-detail-view" style="display:none">
      <div id="workers-detail-content"></div>
    </div>
  </div>

  <!-- Vehicles -->
  <div class="section" id="section-vehicles">
    <div class="page-header">
      <div class="page-title">רכבים</div>
      <div class="page-subtitle" id="vehicles-subtitle"></div>
    </div>
    <div class="search-wrap">
      <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <input class="search-input" id="vehicles-search" type="search" placeholder="חיפוש לפי מספר, סוג..." />
    </div>
    <div class="card-list" id="vehicles-list"></div>
    <div class="saved-at" id="vehicles-saved"></div>
  </div>

  <!-- Heavy equipment -->
  <div class="section" id="section-heavy">
    <div class="page-header">
      <div class="page-title">כלי צמ"ה</div>
      <div class="page-subtitle" id="heavy-subtitle"></div>
    </div>
    <div class="search-wrap">
      <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <input class="search-input" id="heavy-search" type="search" placeholder="חיפוש לפי תיאור, רישיון..." />
    </div>
    <div class="card-list" id="heavy-list"></div>
    <div class="saved-at" id="heavy-saved"></div>
  </div>

  <!-- Lifting equipment -->
  <div class="section" id="section-lifting">
    <div class="page-header">
      <div class="page-title">ציוד הרמה</div>
      <div class="page-subtitle" id="lifting-subtitle"></div>
    </div>
    <div class="search-wrap">
      <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <input class="search-input" id="lifting-search" type="search" placeholder="חיפוש לפי תיאור..." />
    </div>
    <div class="card-list" id="lifting-list"></div>
    <div class="saved-at" id="lifting-saved"></div>
  </div>

</div>

<script>
// ─── Snapshot loader ─────────────────────────────
const PREFIX = 'safedoc_snap_';
const MAX_AGE = 7 * 24 * 60 * 60 * 1000;

function loadSnap(key) {
  try {
    const raw = localStorage.getItem(PREFIX + key);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    const ts = parsed.ts; // cache.ts stores as { data, ts }
    if (!ts || Date.now() - ts > MAX_AGE) { localStorage.removeItem(PREFIX + key); return null; }
    return { data: parsed.data, ts };
  } catch { return null; }
}

function fmtSaved(ts) {
  if (!ts || typeof ts !== 'number' || isNaN(ts)) return 'נשמר — תאריך לא ידוע';
  const mins = Math.round((Date.now() - ts) / 60000);
  if (mins < 1)  return 'נשמר הרגע';
  if (mins < 60) return `נשמר לפני ${mins} דקות`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24)  return `נשמר לפני ${hrs} שעות`;
  if (hrs < 48)  return 'נשמר אתמול';
  return `נשמר לפני ${Math.floor(hrs / 24)} ימים`;
}

// ─── Status logic ────────────────────────────────
function dateStatus(dateStr) {
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const exp = new Date(dateStr); exp.setHours(0,0,0,0);
  if (exp < today) return 'expired';
  return (exp - today) / 86400000 <= 14 ? 'expiring' : 'valid';
}

function worstStatus(statuses) {
  if (statuses.includes('expired'))  return 'expired';
  if (statuses.includes('missing'))  return 'missing';
  if (statuses.includes('expiring')) return 'expiring';
  if (statuses.includes('valid'))    return 'valid';
  return null;
}

function workerStatus(worker) {
  const docs = worker.documents || [];
  const statuses = docs.map(d => dateStatus(d.expiry_date)).filter(Boolean);
  const hasId     = docs.some(d => d.doc_type === 'id_document' && d.file_url);
  const hasHeight = docs.some(d => d.doc_type === 'height_permit');
  const hasVisa   = docs.some(d => d.doc_type === 'work_visa');
  if (!hasId) statuses.push('missing');
  if (worker.is_foreign_worker && !hasVisa) statuses.push('missing');
  return worstStatus(statuses) || 'valid';
}

function vehicleStatus(vehicle) {
  const st = [
    ...(vehicle.vehicle_licenses  || []).map(l => dateStatus(l.expiry_date)),
    ...(vehicle.vehicle_insurances || []).map(i => dateStatus(i.expiry_date)),
  ].filter(Boolean);
  return worstStatus(st) || 'valid';
}

function heavyStatus(eq) {
  const st = [
    dateStatus(eq.license_expiry),
    dateStatus(eq.insurance_expiry),
    dateStatus(eq.inspection_expiry),
  ].filter(Boolean);
  return worstStatus(st) || 'valid';
}

function liftingStatus(eq) { return dateStatus(eq.inspection_expiry) || 'valid'; }

// ─── Badge helpers ───────────────────────────────
const STATUS_LABELS = { valid: 'תקין', expiring: 'עומד לפוג', expired: 'פג תוקף', missing: 'חסר' };
function badge(status) {
  const label = STATUS_LABELS[status]; if (!label) return '';
  return `<span class="badge badge-${status}">${label}</span>`;
}
function cardClass(status) { return `card status-${status}`; }

const CHEVRON = `<svg class="chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>`;

function emptyHtml(msg, sub) {
  return `<div class="empty">
    <svg class="empty-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
        d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
    </svg>
    <div class="empty-title">${msg}</div>
    <div class="empty-sub">${sub || 'אין נתונים שמורים להצגה במצב לא מקוון'}</div>
  </div>`;
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Worker list rendering ───────────────────────
function renderWorkers(workers, query) {
  const q = (query || '').trim();
  const list = workers.filter(w => {
    if (!q) return true;
    return w.full_name.includes(q) ||
      (w.national_id || '').includes(q) ||
      (w.passport_number || '').includes(q);
  });
  if (!list.length) return emptyHtml(q ? 'לא נמצאו עובדים' : 'אין עובדים');
  return list.map(w => {
    const st = workerStatus(w);
    const inactive = w.is_active === false;
    const idLabel = w.is_foreign_worker ? 'דרכון' : 'ת.ז.';
    const idVal = w.national_id || w.passport_number || '—';
    const sub = w.subcontractor?.name ? ` · ${w.subcontractor.name}` : '';
    const proj = w.project_name ? ` · ${w.project_name}` : '';
    return `<div class="${cardClass(st)}${inactive?' opacity-50':''}" data-worker-id="${escHtml(w.id)}">
      <div class="card-avatar">${w.full_name.charAt(0)}</div>
      <div class="card-body">
        <div class="card-name">${escHtml(w.full_name)}${inactive?` <span class="badge-inactive">לא פעיל</span>`:''}</div>
        <div class="card-meta">${idLabel} ${escHtml(idVal)} · ${w.is_foreign_worker?'עובד זר':'ישראלי'}${escHtml(sub)}${escHtml(proj)}</div>
      </div>
      <div class="card-end">${inactive?'':badge(st)}${CHEVRON}</div>
    </div>`;
  }).join('');
}

// ─── Worker detail rendering ─────────────────────
const DOC_LABELS = { id_document: 'תעודת זהות', height_permit: 'אישור עבודה בגובה', work_visa: 'אשרת עבודה' };
const DOC_TYPES  = ['id_document', 'height_permit', 'work_visa'];

function renderWorkerDetail(worker, isFullSnap) {
  if (!worker) return emptyHtml('עובד לא נמצא', 'הנתונים אינם זמינים במצב לא מקוון');
  const st = workerStatus(worker);
  const idLabel = worker.is_foreign_worker ? 'דרכון' : 'ת.ז.';
  const idVal = worker.national_id || worker.passport_number || '—';

  const metaRows = [
    `${idLabel}: ${escHtml(idVal)}`,
    worker.is_foreign_worker ? 'עובד זר' : 'ישראלי',
    worker.phone ? `<span dir="ltr">${escHtml(worker.phone)}</span>` : null,
    worker.subcontractor?.name ? `קבלן: ${escHtml(worker.subcontractor.name)}` : null,
    worker.project_name ? `פרויקט: ${escHtml(worker.project_name)}` : null,
  ].filter(Boolean);

  let html = `
    <div class="back-btn" onclick="backToWorkerList()">← חזור לרשימה</div>
    ${!isFullSnap ? `<div class="basic-data-notice">מוצגים נתונים בסיסיים שנשמרו מהרשימה. לפרטים מלאים נדרש חיבור לאינטרנט.</div>` : ''}
    <div class="worker-header">
      <div class="worker-avatar-lg">${worker.full_name.charAt(0)}</div>
      <div style="flex:1;min-width:0">
        <div class="worker-name-row">
          <span class="worker-name">${escHtml(worker.full_name)}</span>
          ${badge(st)}
          ${worker.is_active===false?`<span class="badge-inactive">לא פעיל</span>`:''}
        </div>
        ${metaRows.map(r=>`<div class="worker-meta">${r}</div>`).join('')}
      </div>
    </div>`;

  // Documents
  const docs = worker.documents || [];
  const docMap = {};
  docs.forEach(d => { if (!docMap[d.doc_type]) docMap[d.doc_type] = d; });

  const docRows = DOC_TYPES.map(type => {
    if (type === 'work_visa' && !worker.is_foreign_worker) return null;
    const doc = docMap[type];
    const hasFile = !!doc?.file_url;
    let st2;
    if (type === 'id_document') {
      st2 = hasFile ? 'valid' : 'missing';
    } else {
      st2 = doc ? (dateStatus(doc.expiry_date) || (hasFile ? 'valid' : 'missing')) : 'missing';
    }
    const expiryStr = doc?.expiry_date
      ? `תוקף: ${new Date(doc.expiry_date).toLocaleDateString('he-IL')}`
      : null;
    return `<div class="doc-row">
      <div class="doc-info">
        <div class="doc-label">${DOC_LABELS[type]}</div>
        ${expiryStr ? `<div class="doc-expiry">${escHtml(expiryStr)}</div>` : ''}
      </div>
      <div class="doc-end">
        ${badge(st2)}
        ${hasFile ? `<button class="view-file-btn" onclick="showOfflineFileMsg()">צפה</button>` : ''}
      </div>
    </div>`;
  }).filter(Boolean).join('');

  html += `<div class="detail-section">
    <div class="detail-section-title">מסמכים</div>
    ${docRows || `<div class="doc-row"><div class="doc-info"><div class="doc-label" style="color:var(--gray-400)">אין מסמכים</div></div></div>`}
  </div>`;

  // Safety briefing
  const briefings = (worker.safety_briefings || []).slice().sort((a,b) => new Date(b.briefed_at)-new Date(a.briefed_at));
  if (briefings.length) {
    const last = briefings[0];
    const bDate  = last.briefed_at ? new Date(last.briefed_at).toLocaleDateString('he-IL') : '—';
    const expDate = last.expires_at ? new Date(last.expires_at).toLocaleDateString('he-IL') : null;
    const bSt = last.expires_at ? (dateStatus(last.expires_at) || 'valid') : 'valid';
    html += `<div class="detail-section">
      <div class="detail-section-title">תדריך בטיחות</div>
      <div class="doc-row">
        <div class="doc-info">
          <div class="doc-label">תדריך אחרון: ${bDate}</div>
          ${expDate ? `<div class="doc-expiry">תוקף: ${expDate}</div>` : ''}
        </div>
        <div class="doc-end">${badge(bSt)}</div>
      </div>
    </div>`;
  }

  // Notes
  if (worker.notes) {
    html += `<div class="notes-card"><div class="notes-label">הערות</div>${escHtml(worker.notes)}</div>`;
  }

  return html;
}

function showWorkerDetail(workerId) {
  // Try full per-worker snapshot first, fall back to list snapshot
  const fullSnap = loadSnap('worker_' + workerId);
  let workerData = null;
  let isFullSnap = false;
  if (fullSnap) {
    workerData = fullSnap.data;
    isFullSnap = true;
  } else {
    const listSnap = loadSnap('workers');
    if (listSnap) workerData = (listSnap.data || []).find(w => w.id === workerId) || null;
  }
  document.getElementById('workers-detail-content').innerHTML = renderWorkerDetail(workerData, isFullSnap);
  document.getElementById('workers-list-view').style.display = 'none';
  document.getElementById('workers-detail-view').style.display = 'block';
  window.scrollTo(0, 0);
}

function backToWorkerList() {
  document.getElementById('workers-list-view').style.display = 'block';
  document.getElementById('workers-detail-view').style.display = 'none';
}

function showOfflineFileMsg() {
  alert('הקובץ עצמו דורש חיבור לאינטרנט.\nבמצב לא מקוון ניתן לצפות בפרטי המסמך בלבד.');
}

// ─── Vehicles rendering ──────────────────────────
function renderVehicles(vehicles, query) {
  const q = (query || '').trim().toLowerCase();
  const list = vehicles.filter(v => !q ||
    v.vehicle_number.toLowerCase().includes(q) ||
    v.vehicle_type.toLowerCase().includes(q) ||
    (v.model||'').toLowerCase().includes(q));
  if (!list.length) return emptyHtml(q ? 'לא נמצאו רכבים' : 'אין רכבים');
  return list.map(v => {
    const st = vehicleStatus(v);
    const inactive = v.is_active === false;
    const meta = [v.vehicle_type, v.model, v.assigned_manager?.full_name].filter(Boolean).join(' · ');
    return `<div class="${cardClass(st)}${inactive?' opacity-50':''}">
      <div class="card-avatar vehicle">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10l2 2h8l2-2zm0 0l2-5 3 1v4h-5z"/>
        </svg>
      </div>
      <div class="card-body">
        <div class="card-name" dir="ltr">${escHtml(v.vehicle_number)}${inactive?` <span class="badge-inactive">לא פעיל</span>`:''}</div>
        <div class="card-meta">${escHtml(meta)}</div>
      </div>
      <div class="card-end">${inactive?'':badge(st)}</div>
    </div>`;
  }).join('');
}

// ─── Heavy equipment rendering ───────────────────
function renderHeavy(list, query) {
  const q = (query || '').trim();
  const filtered = list.filter(e => !q ||
    e.description.includes(q) || (e.license_number||'').includes(q) || (e.machine_identifier||'').includes(q));
  if (!filtered.length) return emptyHtml(q ? 'לא נמצא ציוד' : 'אין כלי צמ"ה');
  return filtered.map(e => {
    const st = heavyStatus(e);
    const inactive = !e.is_active;
    const meta = [e.license_number?`רישיון: ${e.license_number}`:null, e.subcontractor?.name, e.project_name].filter(Boolean).join(' · ');
    return `<div class="${cardClass(st)}${inactive?' opacity-50':''}">
      <div class="card-avatar equipment">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </div>
      <div class="card-body">
        <div class="card-name">${escHtml(e.description)}${inactive?` <span class="badge-inactive">לא פעיל</span>`:''}</div>
        <div class="card-meta">${escHtml(meta||'—')}</div>
      </div>
      <div class="card-end">${inactive?'':badge(st)}</div>
    </div>`;
  }).join('');
}

// ─── Lifting equipment rendering ─────────────────
function renderLifting(list, query) {
  const q = (query || '').trim();
  const filtered = list.filter(e => !q || e.description.includes(q));
  if (!filtered.length) return emptyHtml(q ? 'לא נמצא ציוד' : 'אין ציוד הרמה');
  return filtered.map(e => {
    const st = liftingStatus(e);
    const inactive = !e.is_active;
    const meta = [e.subcontractor?.name, e.project_name].filter(Boolean).join(' · ');
    return `<div class="${cardClass(st)}${inactive?' opacity-50':''}">
      <div class="card-avatar lifting">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11a2 2 0 012 2v3m-7 13H17m0 0a2 2 0 100-4 2 2 0 000 4zm0 0v-4m4-10H11a1 1 0 00-1 1v5"/>
        </svg>
      </div>
      <div class="card-body">
        <div class="card-name">${escHtml(e.description)}${inactive?` <span class="badge-inactive">לא פעיל</span>`:''}</div>
        <div class="card-meta">${escHtml(meta||'—')}</div>
      </div>
      <div class="card-end">${inactive?'':badge(st)}</div>
    </div>`;
  }).join('');
}

// ─── Dashboard ───────────────────────────────────
function renderDashboard(snaps) {
  const workers  = (snaps.workers?.data  || []).filter(w => w.is_active !== false);
  const wStatuses = workers.map(workerStatus);
  const dashData = snaps.dashboard?.data;

  // Prefer computed stats; fall back to dashboard snapshot
  const urgentTotal   = workers.length ? wStatuses.filter(s=>s==='expired'||s==='missing').length : (dashData?.urgentTotal??0);
  const expiringTotal = workers.length ? wStatuses.filter(s=>s==='expiring').length : (dashData?.expiringTotal??0);
  const total         = workers.length || (dashData?.workersCount ?? 0);
  const ok            = total - urgentTotal - expiringTotal;

  const hasAnyData = total > 0 || snaps.vehicles?.data?.length || snaps.heavy?.data?.length;

  const statsEl = document.getElementById('dash-stats');
  statsEl.innerHTML = hasAnyData ? `
    <div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">עובדים פעילים</div></div>
    <div class="stat-card red"><div class="stat-number">${urgentTotal}</div><div class="stat-label">לא תקינים</div></div>
    <div class="stat-card yellow"><div class="stat-number">${expiringTotal}</div><div class="stat-label">עומדים לפוג</div></div>
    <div class="stat-card green"><div class="stat-number">${ok < 0 ? 0 : ok}</div><div class="stat-label">תקינים</div></div>
  ` : `<div style="grid-column:1/-1">${emptyHtml('אין נתונים שמורים', 'התחבר לאינטרנט פעם אחת כדי לשמור נתונים')}</div>`;

  // Issue list from workers
  const issuesEl = document.getElementById('dash-issues');
  const urgentWorkers  = workers.filter(w => { const s=workerStatus(w); return s==='expired'||s==='missing'; });
  const warningWorkers = workers.filter(w => workerStatus(w)==='expiring');
  let issueHtml = '';
  if (urgentWorkers.length) {
    issueHtml += `<div style="font-size:13px;font-weight:600;color:#b91c1c;margin-bottom:6px;">עובדים לא תקינים (${urgentWorkers.length})</div>`;
    issueHtml += `<div class="card-list" style="margin-bottom:14px;">${
      urgentWorkers.slice(0,5).map(w=>`<div class="card status-expired" style="padding:10px 14px" data-worker-id="${escHtml(w.id)}">
        <div class="card-avatar" style="width:32px;height:32px;font-size:13px">${w.full_name.charAt(0)}</div>
        <div class="card-body"><div class="card-name" style="font-size:14px">${escHtml(w.full_name)}</div></div>
        <div class="card-end"><span class="badge badge-expired">לא תקין</span>${CHEVRON}</div>
      </div>`).join('')
    }</div>`;
  }
  if (warningWorkers.length) {
    issueHtml += `<div style="font-size:13px;font-weight:600;color:#92400e;margin-bottom:6px;">עובדים עם מסמכים עומדים לפוג (${warningWorkers.length})</div>`;
    issueHtml += `<div class="card-list" style="margin-bottom:14px;">${
      warningWorkers.slice(0,5).map(w=>`<div class="card status-expiring" style="padding:10px 14px" data-worker-id="${escHtml(w.id)}">
        <div class="card-avatar" style="width:32px;height:32px;font-size:13px">${w.full_name.charAt(0)}</div>
        <div class="card-body"><div class="card-name" style="font-size:14px">${escHtml(w.full_name)}</div></div>
        <div class="card-end"><span class="badge badge-expiring">עומד לפוג</span>${CHEVRON}</div>
      </div>`).join('')
    }</div>`;
  }
  if (!issueHtml && total > 0) {
    issueHtml = `<div class="empty" style="padding:24px 0"><div class="empty-title" style="color:#16a34a">כל העובדים תקינים</div></div>`;
  }
  issuesEl.innerHTML = issueHtml;

  const savedEl = document.getElementById('dash-saved');
  const bestTs = snaps.workers?.ts || snaps.dashboard?.ts;
  if (bestTs) savedEl.textContent = fmtSaved(bestTs);
}

// ─── Tab switching ───────────────────────────────
function showTab(name) {
  // Reset worker detail view when switching away
  if (name !== 'workers') {
    document.getElementById('workers-list-view').style.display = 'block';
    document.getElementById('workers-detail-view').style.display = 'none';
  }
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.section === name));
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'section-' + name));
  const activeTab = document.querySelector(`.tab[data-section="${name}"]`);
  if (activeTab) activeTab.scrollIntoView({ inline: 'center', behavior: 'smooth', block: 'nearest' });
}

// ─── Event delegation for worker clicks ─────────
function setupWorkerClickDelegation() {
  ['workers-list', 'dash-issues'].forEach(listId => {
    const el = document.getElementById(listId);
    if (el) el.addEventListener('click', e => {
      const card = e.target.closest('[data-worker-id]');
      if (!card) return;
      const id = card.dataset.workerId;
      // If clicking from dashboard, switch to workers tab first
      if (listId === 'dash-issues') showTab('workers');
      showWorkerDetail(id);
    });
  });
}

// ─── Init ────────────────────────────────────────
(function init() {
  const snaps = {
    dashboard: loadSnap('dashboard'),
    workers:   loadSnap('workers'),
    vehicles:  loadSnap('vehicles'),
    heavy:     loadSnap('heavy_equipment'),
    lifting:   loadSnap('lifting_equipment'),
  };

  // Workers list
  const wData = snaps.workers?.data || [];
  document.getElementById('workers-subtitle').textContent = wData.length
    ? `${wData.filter(w=>w.is_active!==false).length} עובדים פעילים`
    : 'אין נתונים שמורים';
  document.getElementById('workers-list').innerHTML = wData.length ? renderWorkers(wData,'') : emptyHtml('אין עובדים שמורים');
  if (snaps.workers) document.getElementById('workers-saved').textContent = fmtSaved(snaps.workers.ts);
  document.getElementById('workers-search').addEventListener('input', e => {
    document.getElementById('workers-list').innerHTML = renderWorkers(wData, e.target.value);
  });

  // Vehicles
  const vData = snaps.vehicles?.data || [];
  document.getElementById('vehicles-subtitle').textContent = vData.length
    ? `${vData.filter(v=>v.is_active!==false).length} רכבים פעילים`
    : 'אין נתונים שמורים';
  document.getElementById('vehicles-list').innerHTML = vData.length ? renderVehicles(vData,'') : emptyHtml('אין רכבים שמורים');
  if (snaps.vehicles) document.getElementById('vehicles-saved').textContent = fmtSaved(snaps.vehicles.ts);
  document.getElementById('vehicles-search').addEventListener('input', e => {
    document.getElementById('vehicles-list').innerHTML = renderVehicles(vData, e.target.value);
  });

  // Heavy equipment
  const hData = snaps.heavy?.data || [];
  document.getElementById('heavy-subtitle').textContent = hData.length
    ? `${hData.filter(e=>e.is_active).length} פעילים`
    : 'אין נתונים שמורים';
  document.getElementById('heavy-list').innerHTML = hData.length ? renderHeavy(hData,'') : emptyHtml('אין כלי צמ"ה שמורים');
  if (snaps.heavy) document.getElementById('heavy-saved').textContent = fmtSaved(snaps.heavy.ts);
  document.getElementById('heavy-search').addEventListener('input', e => {
    document.getElementById('heavy-list').innerHTML = renderHeavy(hData, e.target.value);
  });

  // Lifting equipment
  const lData = snaps.lifting?.data || [];
  document.getElementById('lifting-subtitle').textContent = lData.length
    ? `${lData.filter(e=>e.is_active).length} פעילים`
    : 'אין נתונים שמורים';
  document.getElementById('lifting-list').innerHTML = lData.length ? renderLifting(lData,'') : emptyHtml('אין ציוד הרמה שמור');
  if (snaps.lifting) document.getElementById('lifting-saved').textContent = fmtSaved(snaps.lifting.ts);
  document.getElementById('lifting-search').addEventListener('input', e => {
    document.getElementById('lifting-list').innerHTML = renderLifting(lData, e.target.value);
  });

  // Dashboard
  renderDashboard(snaps);

  // Tab handlers
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => showTab(t.dataset.section));
  });

  // Worker click delegation
  setupWorkerClickDelegation();

  // Initial tab based on URL path
  const path = window.location.pathname;
  let tab = 'dashboard';
  if (path.startsWith('/workers'))              tab = 'workers';
  else if (path.startsWith('/vehicles'))        tab = 'vehicles';
  else if (path.startsWith('/heavy-equipment')) tab = 'heavy';
  else if (path.startsWith('/lifting-equipment')) tab = 'lifting';
  showTab(tab);

  // If navigated to a specific worker route, open detail
  if (path.startsWith('/workers/') && path.length > '/workers/'.length) {
    const workerId = path.split('/workers/')[1].split('/')[0];
    if (workerId) showWorkerDetail(workerId);
  }

  // Reload when connection returns
  window.addEventListener('online', () => window.location.reload());
})();
</script>
